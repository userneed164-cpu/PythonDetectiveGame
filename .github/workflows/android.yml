name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtool autoconf automake pkg-config zlib1g-dev python3-dev libffi-dev libssl-dev openjdk-17-jdk
          pip install --upgrade pip
          pip install "cython<3.0.0" setuptools buildozer kivy

      - name: Build with Buildozer
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          # Fresh spec file generate karna
          buildozer init
          
          # Requirements aur permissions ko script ke zariye modify karna
          sed -i 's/requirements = python3,kivy/requirements = python3,pygame-ce/' buildozer.spec
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          
          # Android architectures ko restrict karna taake build jaldi aur bina error ke ho
          sed -i 's/#android.archs = arm64-v8a, armeabi-v7a/android.archs = arm64-v8a/' buildozer.spec
          
          # Auto-accept Android SDK licenses before build
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Force build target android
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-Detective-APK
          path: bin/*.apk

