name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Compilation Dependencies
        run: |
          sudo apt-get update
          # Saare zaroori compilation tools aur SDL2 supporting libraries ek sath install karna
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libncursesw5-dev libsqlite3-dev libssl-dev libbz2-dev libffi-dev liblzma-dev cmake ninja-build ccache
          pip install --upgrade pip
          pip install cython setuptools buildozer

      - name: Build with Buildozer
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          # 1. Spec file banana
          buildozer init
          
          # 2. Pygame-ce requirement add karna
          sed -i 's/requirements = python3,kivy/requirements = python3,pygame-ce/' buildozer.spec
          
          # 3. Orientation ko landscape par set karna (Kyunki game wide hai)
          sed -i 's/orientation = portrait/orientation = landscape/' buildozer.spec
          
          # 4. Architecture sirf arm64-v8a rakhna taake jaldi build ho
          sed -i 's/^#\? \?android.archs =.*/android.archs = arm64-v8a/' buildozer.spec
          
          # 5. Licenses auto-accept force karna
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          
          # 6. Build execution with automated inputs
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-Detective-APK
          path: bin/*.apk
