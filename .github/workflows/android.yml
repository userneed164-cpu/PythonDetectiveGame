name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtool autoconf automake pkg-config zlib1g-dev python3-dev libffi-dev libssl-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" setuptools buildozer

      - name: Build with Buildozer
        run: |
          yes | buildozer init
          sed -i 's/requirements = python3,kivy/requirements = python3,pygame-ce/' buildozer.spec
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-Detective-APK
          path: bin/*.apk

