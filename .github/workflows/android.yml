name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Compilation Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libncursesw5-dev libsqlite3-dev libssl-dev libbz2-dev libffi-dev liblzma-dev cmake ninja-build ccache
          pip install --upgrade pip
          pip install cython setuptools buildozer

      - name: Build with Buildozer
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          buildozer init
          sed -i 's/^requirements =.*/requirements = python3,pygame-ce/' buildozer.spec
          sed -i 's/^# \?android.bootstrap =.*/android.bootstrap = sdl2/' buildozer.spec
          sed -i 's/^orientation =.*/orientation = landscape/' buildozer.spec
          sed -i 's/^# \?android.archs =.*/android.archs = arm64-v8a/' buildozer.spec
          sed -i 's/^# \?android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-Detective-APK
          path: bin/*.apk

