name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtool autoconf automake pkg-config zlib1g-dev python3-dev libffi-dev libssl-dev openjdk-17-jdk
          pip install --upgrade pip
          pip install "cython<3.0.0" setuptools buildozer kivy

      - name: Build with Buildozer
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          # 1. Init file
          buildozer init
          
          # 2. Pygame-ce aur requirements set karna
          sed -i 's/requirements = python3,kivy/requirements = python3,pygame-ce/' buildozer.spec
          
          # 3. Game landscape hai, toh orientation fix karna
          sed -i 's/orientation = portrait/orientation = landscape/' buildozer.spec
          
          # 4. Architecture handle karna (Purani line poori badalna)
          sed -i 's/^#\? \?android.archs =.*/android.archs = arm64-v8a/' buildozer.spec
          
          # 5. Buildozer ko auto-accept license par force karna
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          
          # 6. Final Execution with auto 'yes' prompt input
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-Detective-APK
          path: bin/*.apk

